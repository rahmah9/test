<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .chat-wrapper {
      display: flex;
      flex-direction: column;
      height: 520px;
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    .chat-header {
      padding: 14px 18px;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #1D9E75;
    }
    .chat-header-title {
      font-size: 14px;
      font-weight: 500;
      color: #111;
    }
    .chat-header-sub {
      font-size: 12px;
      color: #888;
      margin-left: auto;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 72%;
    }
    .msg-row.me { align-self: flex-end; align-items: flex-end; }
    .msg-row.other { align-self: flex-start; align-items: flex-start; }
    .msg-name {
      font-size: 11px;
      color: #888;
      margin-bottom: 3px;
      padding: 0 4px;
    }
    .msg-bubble {
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
    }
    .msg-row.me .msg-bubble {
      background: #378ADD;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-row.other .msg-bubble {
      background: #f0f0f0;
      color: #111;
      border-bottom-left-radius: 4px;
    }
    .msg-time {
      font-size: 10px;
      color: #aaa;
      margin-top: 3px;
      padding: 0 4px;
    }
    .msg-translation {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  margin-top: 6px;
  padding-top: 6px;
  border-top: 0.5px solid rgba(255,255,255,0.25);
  font-style: italic;
}
.msg-row.other .msg-translation {
  color: #888;
  border-top-color: rgba(0,0,0,0.1);
}
    .chat-input-area {
      padding: 12px 16px;
      border-top: 0.5px solid rgba(0,0,0,0.1);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .chat-input-area input {
      flex: 1;
      border: 0.5px solid rgba(0,0,0,0.18);
      border-radius: 20px;
      padding: 9px 16px;
      font-size: 14px;
      background: #f7f7f7;
      color: #111;
      outline: none;
      font-family: inherit;
    }
    .chat-input-area input:focus {
      border-color: #1D9E75;
      box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
      background: #fff;
    }
    .send-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #1D9E75;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn svg { width: 16px; height: 16px; fill: white; }

    .users-sidebar {
  width: 200px;
  flex-shrink: 0;
  background: #fff;
  border: 0.5px solid rgba(0,0,0,0.12);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,0.06);
}
.users-header {
  padding: 14px 18px;
  font-size: 14px;
  font-weight: 500;
  color: #111;
  border-bottom: 0.5px solid rgba(0,0,0,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.users-header button {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: #1D9E75;
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.user-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  transition: background 0.1s;
}
.user-item:hover { background: #f5f5f5; }
.user-item.active { background: #e8f7f2; }
.user-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  object-fit: cover;
  background: #ddd;
}
.user-name {
  font-size: 13px;
  color: #111;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 13px;
    }
    .username-screen {
      position: fixed;
      inset: 0;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .username-card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .username-card h2 {
      font-size: 16px;
      font-weight: 500;
      color: #111;
    }
    .username-card p {
      font-size: 13px;
      color: #888;
      margin-top: -8px;
    }
    .username-card input {
      width: 100%;
      border: 0.5px solid rgba(0,0,0,0.18);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      background: #f7f7f7;
      color: #111;
      outline: none;
      font-family: inherit;
    }
    .username-card input:focus {
      border-color: #1D9E75;
      box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
      background: #fff;
    }
    .username-card button {
      width: 100%;
      padding: 10px;
      background: #1D9E75;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .username-card button:hover { opacity: 0.87; }
    .username-error {
      font-size: 12px;
      color: #E24B4A;
      display: none;
    }
  </style>
</head>
<body>

<div class="username-screen" id="username-screen">
  <div class="username-card">
    <h2>Welcome to Simple Chat</h2>
    <p>Login to get started</p>
    <button onclick="loginGoogle()">Login with Google</button>
  </div>
</div>

<div style="display:flex; gap:16px; align-items:flex-start; width:100%; max-width:820px;">

<div class="users-sidebar" id="users-sidebar">
  <div class="users-header">
    Contacts
    <button onclick="showAddContact()" id="add-btn">+</button>
  </div>
  <div id="add-contact-form" style="display:none; padding: 10px;">
    <input type="text" id="contact-email" placeholder="Email Google..." style="width:100%; padding: 6px 10px; border: 0.5px solid rgba(0,0,0,0.18); border-radius: 8px; font-size: 13px; outline:none;" />
    <button onclick="addContact()" style="margin-top: 6px; width:100%; padding: 6px; background:#1D9E75; color:#fff; border:none; border-radius: 8px; font-size: 13px; cursor:pointer;">Add</button>
    <p id="add-contact-error" style="font-size:11px; color:#E24B4A; margin-top:4px; display:none;"></p>
  </div>
  <div id="users-list"></div>
</div>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="chat-header-dot"></div>
    <span class="chat-header-title">Simple Chat</span>
    <span class="chat-header-sub" id="status">Connecting...</span>
<button onclick="logOut()" style="margin-left:8px; padding: 4px 10px; font-size:12px; border:0.5px solid rgba(0,0,0,0.15); border-radius:6px; background:transparent; cursor:pointer; color:#888;">Logout</button>
  </div>
  <div class="chat-messages" id="messages">
    <div class="empty-state" id="empty">No messages yet</div>
  </div>
  <div class="chat-input-area">
    <input type="text" id="msg-input" placeholder="Type a message..." />
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, onSnapshot, orderBy, query, serverTimestamp, setDoc, doc, getDocs, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // 🔧 GANTI DENGAN CONFIG FIREBASE KAMU
  const firebaseConfig = {
    apiKey: "AIzaSyDrOFvOzxa3FdG-sVOLbVoLp8V1FsNg7L4",
  authDomain: "simple-chat-1-78b24.firebaseapp.com",
  projectId: "simple-chat-1-78b24",
  storageBucket: "simple-chat-1-78b24.firebasestorage.app",
  messagingSenderId: "322856199214",
  appId: "1:322856199214:web:6d03b33535768d0774abbf"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  getRedirectResult(auth).catch((err) => {
  console.error("Redirect login error:", err);
});
  const messagesDiv = document.getElementById("messages");
  const input = document.getElementById("msg-input");
  const statusEl = document.getElementById("status");
  const emptyEl = document.getElementById("empty");

  async function translateText(text) {
  try {
    const res = await fetch(
      `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=id|en`
    );
    const data = await res.json();
    return data.responseData.translatedText;
  } catch {
    return null;
  }
}

let username = "";
let currentRoomId = null;
let currentUid = null;

window.logOut = async () => {
  await signOut(auth);
  currentUid = null;
  currentRoomId = null;
  username = "";
  document.getElementById("users-list").innerHTML = "";
  document.getElementById("messages").innerHTML = "";
  document.querySelector(".chat-header-title").textContent = "Simple Chat";
};

window.showAddContact = () => {
  const form = document.getElementById("add-contact-form");
  form.style.display = form.style.display === "none" ? "block" : "none";
};

window.addContact = async () => {
  const email = document.getElementById("contact-email").value.trim();
  const errEl = document.getElementById("add-contact-error");
  if (!email) { errEl.textContent = "Email kosong!"; errEl.style.display = "block"; return; }

  // Cari user berdasarkan email
  const snapshot = await getDocs(collection(db, "users"));
  let found = null;
  snapshot.forEach((d) => {
    if (d.data().email === email) found = d.data();
  });

  if (!found) {
    errEl.textContent = "User tidak ditemukan.";
    errEl.style.display = "block";
    return;
  }

  if (found.uid === currentUid) {
    errEl.textContent = "Itu akun kamu sendiri!";
    errEl.style.display = "block";
    return;
  }

  // Simpan ke contacts
 await setDoc(doc(db, "users", user.uid), {
  name: user.displayName,
  photo: user.photoURL,
  uid: user.uid,
  email: user.email
});

  errEl.style.display = "none";
  document.getElementById("contact-email").value = "";
  document.getElementById("add-contact-form").style.display = "none";
  loadContacts(currentUid);
};

async function loadContacts(myUid) {
  currentUid = myUid;
  const snapshot = await getDocs(collection(db, "users", myUid, "contacts"));
  const list = document.getElementById("users-list");
  list.innerHTML = "";
  if (snapshot.empty) {
    list.innerHTML = `<div style="padding:14px; font-size:12px; color:#aaa;">No contacts yet.<br>Tap + to add.</div>`;
    return;
  }
  snapshot.forEach((d) => {
    const u = d.data();
    const item = document.createElement("div");
    item.className = "user-item";
    item.innerHTML = `
      <img class="user-avatar" src="${u.photo || ''}" onerror="this.style.display='none'" />
      <span class="user-name">${u.name}</span>
    `;
    item.onclick = () => openRoom(myUid, u.uid, u.name, item);
    list.appendChild(item);
  });
}

function openRoom(myUid, otherUid, otherName, itemEl) {
  document.querySelectorAll(".user-item").forEach(e => e.classList.remove("active"));
  itemEl.classList.add("active");

  const ids = [myUid, otherUid].sort();
  currentRoomId = ids.join("_");

  document.querySelector(".chat-header-title").textContent = otherName;
  document.getElementById("messages").innerHTML = "";

  const q = query(collection(db, "rooms", currentRoomId, "messages"), orderBy("time"));
  console.log("openRoom called, username saat ini:", username);
  onSnapshot(q, (snapshot) => {
    const messagesDiv = document.getElementById("messages");
    messagesDiv.innerHTML = "";
    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const isMe = data.uid === currentUid;
      const row = document.createElement("div");
      row.className = "msg-row " + (isMe ? "me" : "other");
      row.innerHTML = `
        ${!isMe ? `<div class="msg-name">${data.user || "Anon"}</div>` : ""}
        <div class="msg-bubble">
          ${data.text}
          <div class="msg-translation" id="tr-${docSnap.id}">translating...</div>
        </div>
        <div class="msg-time">${formatTime(data.time)}</div>
      `;
      messagesDiv.appendChild(row);
      translateText(data.text).then(translated => {
        const el = document.getElementById(`tr-${docSnap.id}`);
        if (el && translated && translated.toLowerCase() !== data.text.toLowerCase()) {
          el.textContent = translated;
        } else if (el) {
          el.textContent = "";
        }
      });
    });
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}
window.loginGoogle = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (err) {
    console.error("Login error:", err.code, err.message);
    alert("Login gagal: " + err.message);
  }
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    username = user.displayName;

    // Simpan user ke database
    await setDoc(doc(db, "users", user.uid), {
      name: user.displayName,
      photo: user.photoURL,
      uid: user.uid
    });

    document.getElementById("username-screen").style.display = "none";
    loadContacts(user.uid);
  } else {
    document.getElementById("username-screen").style.display = "flex";
  }
});

  function formatTime(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date();
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  const q = query(collection(db, "messages"), orderBy("time"));
  onSnapshot(q, (snapshot) => {
    statusEl.textContent = "Online";
    if (snapshot.empty) {
      emptyEl.style.display = "flex";
    } else {
      emptyEl.style.display = "none";
      messagesDiv.querySelectorAll(".msg-row").forEach(e => e.remove());
      snapshot.forEach((doc) => {
        const data = doc.data();
        const isMe = data.user === username;
        console.log("username:", username, "| data.user:", data.user);
        const row = document.createElement("div");
        row.className = "msg-row " + (isMe ? "me" : "other");
        row.innerHTML = `
  ${!isMe ? `<div class="msg-name">${data.user || "Anon"}</div>` : ""}
  <div class="msg-bubble">
    ${data.text}
    <div class="msg-translation" id="tr-${doc.id}">translating...</div>
  </div>
  <div class="msg-time">${formatTime(data.time)}</div>
`;
messagesDiv.appendChild(row);

translateText(data.text).then(translated => {
  const el = document.getElementById(`tr-${doc.id}`);
  if (el && translated && translated.toLowerCase() !== data.text.toLowerCase()) {
    el.textContent = translated;
  } else if (el) {
    el.textContent = "";
  }
});
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  }, () => {
    statusEl.textContent = "Disconnected";
  });

  window.sendMessage = async () => {
  const text = input.value.trim();
  if (!text || !currentRoomId) return;
  await addDoc(collection(db, "rooms", currentRoomId, "messages"), {
    text,
    user: username,
    uid: currentUid,
    time: serverTimestamp()
  });
  input.value = "";
};

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") window.sendMessage();
  });
</script>

</body>
</html>
